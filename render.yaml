# Render Blueprint for Consignment Site
# WARNING: Keep repo private - contains secrets

databases:
  - name: consignment-db
    plan: free
    databaseName: consignment
    user: consignment

services:
  - type: web
    name: consignment-website
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn consignment.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consignment-db
          property: connectionString
      - key: SECRET_KEY
        value: django-insecure-x7k9m2p4q8r1s5t3u6v0w9y2z4a7b1c3d5e8f0g2h4j6
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
