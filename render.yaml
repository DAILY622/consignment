databases:
  - name: consignment-db
    plan: free
    databaseName: consignment
    user: consignment

services:
  - type: web
    name: consignment-website
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn consignment.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consignment-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
