# Render Blueprint for DailyFX Delivery Logistics
# Complete deployment configuration for Render.com

databases:
  - name: consignment-db
    databaseName: consignment
    user: consignment
    plan: starter  # Free tier PostgreSQL

services:
  - type: web
    name: dailyfx-delivery
    runtime: python
    plan: starter  # Free tier (starter) or paid (standard/pro)
    region: oregon  # Choose: oregon, frankfurt, singapore, ohio
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn consignment.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile -"
    healthCheckPath: /
    autoDeploy: true  # Auto-deploy on git push
    
    envVars:
      # Database Configuration
      - key: DATABASE_URL
        fromDatabase:
          name: consignment-db
          property: connectionString
      
      # Django Configuration
      - key: SECRET_KEY
        generateValue: true  # Render will generate a secure random key
      
      - key: DEBUG
        value: "False"
      
      - key: PYTHON_VERSION
        value: "3.12.0"
      
      - key: DJANGO_SETTINGS_MODULE
        value: "consignment.settings"
      
      # Additional Security
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      
      # Email Configuration (optional - configure if needed)
      # - key: EMAIL_HOST
      #   value: "smtp.gmail.com"
      # - key: EMAIL_PORT
      #   value: "587"
      # - key: EMAIL_USE_TLS
      #   value: "True"
      # - key: EMAIL_HOST_USER
      #   value: "your-email@gmail.com"
      # - key: EMAIL_HOST_PASSWORD
      #   sync: false  # Use Render dashboard to set sensitive values
      # - key: DEFAULT_FROM_EMAIL
      #   value: "noreply@dailyfxdelivery.com"
      
      # Logging
      - key: DJANGO_LOG_LEVEL
        value: "INFO"
      
      # Production Settings
      - key: WEB_CONCURRENCY
        value: "2"  # Number of Gunicorn workers
