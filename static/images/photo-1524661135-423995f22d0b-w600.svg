<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#d1fae5"/>
  <!-- Roads -->
  <rect x="0" y="180" width="600" height="40" fill="#6b7280"/>
  <rect x="280" y="0" width="40" height="400" fill="#6b7280"/>
  <path d="M0 350 Q150 250 300 300 Q450 350 600 280" stroke="#6b7280" stroke-width="30" fill="none"/>
  <!-- Buildings -->
  <rect x="50" y="80" width="80" height="80" fill="#9ca3af" rx="4"/>
  <rect x="150" y="60" width="60" height="100" fill="#6b7280" rx="4"/>
  <rect x="400" y="50" width="100" height="110" fill="#9ca3af" rx="4"/>
  <rect x="520" y="80" width="60" height="80" fill="#6b7280" rx="4"/>
  <rect x="50" y="250" width="70" height="70" fill="#9ca3af" rx="4"/>
  <rect x="450" y="320" width="90" height="60" fill="#6b7280" rx="4"/>
  <!-- Route markers -->
  <circle cx="100" cy="200" r="15" fill="#ef4444"/>
  <circle cx="500" cy="200" r="15" fill="#10b981"/>
  <path d="M100 200 L200 200 L300 200 L400 200 L500 200" stroke="#4f46e5" stroke-width="4" fill="none" stroke-dasharray="10,5"/>
  <!-- Truck icon -->
  <rect x="280" y="185" width="40" height="25" fill="#4f46e5" rx="4"/>
  <circle cx="290" cy="215" r="6" fill="#1f2937"/>
  <circle cx="310" cy="215" r="6" fill="#1f2937"/>
</svg>
