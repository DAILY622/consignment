<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="office" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#office)"/>
  <!-- Office Interior -->
  <rect x="0" y="600" width="1600" height="300" fill="#64748b"/>
  <!-- Desks -->
  <rect x="100" y="450" width="300" height="150" fill="#78716c" rx="4"/>
  <rect x="500" y="450" width="300" height="150" fill="#78716c" rx="4"/>
  <rect x="900" y="450" width="300" height="150" fill="#78716c" rx="4"/>
  <!-- Monitors -->
  <rect x="180" y="350" width="140" height="100" fill="#1f2937" rx="4"/>
  <rect x="190" y="360" width="120" height="70" fill="#60a5fa"/>
  <rect x="580" y="350" width="140" height="100" fill="#1f2937" rx="4"/>
  <rect x="590" y="360" width="120" height="70" fill="#60a5fa"/>
  <rect x="980" y="350" width="140" height="100" fill="#1f2937" rx="4"/>
  <rect x="990" y="360" width="120" height="70" fill="#60a5fa"/>
  <!-- People silhouettes -->
  <circle cx="250" cy="280" r="40" fill="#6366f1"/>
  <rect x="220" y="320" width="60" height="80" fill="#6366f1" rx="4"/>
  <circle cx="650" cy="280" r="40" fill="#ec4899"/>
  <rect x="620" y="320" width="60" height="80" fill="#ec4899" rx="4"/>
  <circle cx="1050" cy="280" r="40" fill="#10b981"/>
  <rect x="1020" y="320" width="60" height="80" fill="#10b981" rx="4"/>
  <!-- Window -->
  <rect x="1300" y="100" width="250" height="400" fill="#bfdbfe" rx="8"/>
  <line x1="1425" y1="100" x2="1425" y2="500" stroke="#94a3b8" stroke-width="4"/>
  <line x1="1300" y1="300" x2="1550" y2="300" stroke="#94a3b8" stroke-width="4"/>
</svg>
