<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#1f2937"/>
  <!-- Warehouse shelves -->
  <rect x="100" y="200" width="400" height="600" fill="#374151" rx="8"/>
  <rect x="120" y="220" width="360" height="100" fill="#4b5563"/>
  <rect x="120" y="340" width="360" height="100" fill="#4b5563"/>
  <rect x="120" y="460" width="360" height="100" fill="#4b5563"/>
  <rect x="120" y="580" width="360" height="100" fill="#4b5563"/>
  <!-- Packages on shelves -->
  <rect x="140" y="240" width="60" height="60" fill="#fbbf24" rx="4"/>
  <rect x="220" y="250" width="50" height="50" fill="#f59e0b" rx="4"/>
  <rect x="290" y="235" width="70" height="65" fill="#fbbf24" rx="4"/>
  <rect x="380" y="245" width="55" height="55" fill="#f59e0b" rx="4"/>
  <rect x="150" y="365" width="65" height="55" fill="#4f46e5" rx="4"/>
  <rect x="240" y="360" width="50" height="60" fill="#6366f1" rx="4"/>
  <rect x="310" y="370" width="60" height="50" fill="#4f46e5" rx="4"/>
  <!-- Second shelf unit -->
  <rect x="600" y="200" width="400" height="600" fill="#374151" rx="8"/>
  <rect x="620" y="220" width="360" height="100" fill="#4b5563"/>
  <rect x="620" y="340" width="360" height="100" fill="#4b5563"/>
  <rect x="620" y="460" width="360" height="100" fill="#4b5563"/>
  <!-- Forklift -->
  <rect x="1200" y="500" width="200" height="150" fill="#f59e0b" rx="8"/>
  <rect x="1150" y="400" width="50" height="250" fill="#78716c"/>
  <rect x="1130" y="380" width="90" height="30" fill="#78716c"/>
  <circle cx="1250" cy="680" r="35" fill="#1f2937"/>
  <circle cx="1380" cy="680" r="35" fill="#1f2937"/>
  <!-- Ceiling lights -->
  <rect x="300" y="50" width="200" height="20" fill="#fef3c7"/>
  <rect x="700" y="50" width="200" height="20" fill="#fef3c7"/>
  <rect x="1100" y="50" width="200" height="20" fill="#fef3c7"/>
  <!-- Floor markings -->
  <rect x="0" y="850" width="1920" height="10" fill="#fbbf24"/>
</svg>
