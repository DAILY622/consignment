{% extends 'base.html' %}

{% block title %}Password Reset Complete - E-Cognite{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="bg-gradient-to-br from-primary-50 to-accent-50 rounded-2xl p-8 border border-primary-100">
        <div class="text-6xl mb-4">✅</div>
        <h1 class="text-2xl font-bold text-primary-800 mb-4">Password Reset Complete!</h1>
        <p class="text-primary-600 mb-6">
            Your password has been successfully reset. You can now log in with your new password.
        </p>
        <a href="{% url 'login' %}" class="inline-block w-full bg-gradient-to-r from-primary-600 to-accent-600 text-white py-3 rounded-lg font-semibold hover:from-primary-700 hover:to-accent-700 transition">
            Sign In Now →
        </a>
    </div>
</div>
{% endblock %}
